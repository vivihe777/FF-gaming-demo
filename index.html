<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flappy Quest</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div id="app">
      <section id="hud" class="hud" aria-live="polite">
        <div class="hud-card hud-score">
          <span>分数</span>
          <strong id="score">0</strong>
        </div>
        <div class="hud-card hud-level">
          <span>关卡</span>
          <strong id="level">1 / 10</strong>
        </div>
        <div class="hud-card hud-progress">
          <span id="challenge">穿过 5 道风门</span>
          <div class="progress-track">
            <div id="progressBar" class="progress-bar"></div>
          </div>
        </div>
        <button id="pauseButton" class="icon-button" type="button" title="暂停">II</button>
      </section>

      <section id="menu" class="menu-panel">
        <div class="brand-block">
          <p class="eyebrow">10 关飞行挑战</p>
          <h1>Flappy Quest</h1>
          <p id="statusText">点击、触屏或按空格上升，穿过风门完成闯关。</p>
        </div>

        <div class="skin-selector" aria-label="皮肤选择">
          <button class="skin-option active" type="button" data-skin="aurora">
            <span class="skin-swatch aurora"></span>
            <span>极光飞行员</span>
          </button>
          <button class="skin-option" type="button" data-skin="ember">
            <span class="skin-swatch ember"></span>
            <span>赤焰赛车手</span>
          </button>
          <button class="skin-option" type="button" data-skin="lunar">
            <span class="skin-swatch lunar"></span>
            <span>月影探险家</span>
          </button>
        </div>

        <div id="rewardText" class="reward-text">奖励：每关完成后获得短暂无敌护盾。</div>

        <div class="menu-actions">
          <button id="startButton" class="primary-button" type="button">开始挑战</button>
          <button id="restartButton" class="secondary-button hidden" type="button">重新开始</button>
          <button id="homeButton" class="secondary-button hidden" type="button">主界面</button>
        </div>
      </section>

      <div id="game"></div>
    </div>
    <script src="./public/vendor/phaser.min.js"></script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
